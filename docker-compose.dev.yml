services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interview_review
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6500:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
